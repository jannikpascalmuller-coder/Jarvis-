      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+ak},
      body:JSON.stringify({model,max_tokens:2000,messages:[{role:'system',content:dp?SD:SJ},...grokMessages]})
    });
    if(!res.ok){
      const e=await res.json();
      // Fallback auf grok-3 wenn Vision-Modell Fehler
      if(hasImage){
        notify('⚠️ VISION','Bild-Analyse nicht verfügbar, Text-Modus aktiv');
        const textMessages=grokMessages.map(m=>{
          if(Array.isArray(m.content)){
            return{role:m.role,content:m.content.filter(c=>c.type==='text').map(c=>c.text).join('\n')};
          }
          return m;
        });
        const r2=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ak},body:JSON.stringify({model:'grok-3',max_tokens:2000,messages:[{role:'system',content:dp?SD:SJ},...textMessages]})});
        if(!r2.ok){const e2=await r2.json();throw new Error(e2.error?.message||'API Fehler');}
        const d2=await r2.json();
        const txt2=d2.choices?.[0]?.message?.content||'Keine Antwort.';
        if(!sys)hist.push({role:'assistant',content:txt2});
        addMsg(dp?'dp':'j',txt2,true,displayExtra);
        think(false);setTimeout(()=>speak(txt2),200);return;
      }
      throw new Error(e.error?.message||'API Fehler '+res.status);
    }
    const data=await res.json();
    const txt=data.choices?.[0]?.message?.content||'Keine Antwort.';
    if(!sys)hist.push({role:'assistant',content:txt});
    addMsg(dp?'dp':'j',txt,true,displayExtra);
    think(false);setTimeout(()=>speak(txt),200);
  }catch(e){think(false);addMsg('j',`⚠️ Fehler: ${e.message}`,false,'');}
}
async function send(){const el=document.getElementById('inp');const t=el.value.trim();const hasAttach=pendingImg||pendingFile;if(!t&&!hasAttach)return;el.value='';ar(el);let uExtra='';if(pendingImg)uExtra+=`<img src="data:${pendingImg.mediaType};base64,${pendingImg.base64}" class="chat-img">`;if(pendingFile)uExtra+=`<div class="file-chip">📄 ${pendingFile.name}</div>`;addMsg('u',t||'[Analyse]',false,uExtra);await call(t||'Bitte analysiere was du siehst/liest.');}
function addMsg(role,text,tts,extra){const ch=document.getElementById('ch');const id='m'+Date.now();const time=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});const d=document.createElement('div');d.className=`msg${role==='u'?' u':''}`;d.id=id;const isDP=role==='dp';d.innerHTML=`<div class="av ${role==='u'?'u':isDP?'dp-av':'j'}">${role==='u'?'ML':isDP?'💀':'JV'}</div><div class="mc${isDP?' dp-mc':''}"><div class="mh"><span class="n${isDP?' dpn':''}">${role==='u'?'MASTER LUCIFER':isDP?'D.E.A.D.P.O.O.L.':'J.A.R.V.I.S.'}</span><div style="display:flex;align-items:center;gap:6px;"><span style="opacity:.4;font-size:9px;">${time}</span>${tts?`<button class="tts" onclick="ttsBtn('${id}',this)">🔊</button>`:''}</div></div>${extra||''}<div class="mt">${fmt(text)}</div></div>`;ch.appendChild(d);ch.scrollTop=ch.scrollHeight;}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--p)">$1</strong>').replace(/\*(.*?)\*/g,'<em style="color:var(--g)">$1</em>').replace(/▸/g,'<span style="color:var(--p)">▸</span>').replace(/⚡/g,'<span style="color:var(--a)">⚡</span>').replace(/✅/g,'<span style="color:var(--g)">✅</span>').replace(/⚠️/g,'<span style="color:var(--d)">⚠️</span>').replace(/\n/g,'<br>');}
function speak(text){if(!('speechSynthesis'in window))return;stopS();const clean=text.replace(/<[^>]*>/g,'').replace(/[▸⚡✅⚠️]/g,'');const u=new SpeechSynthesisUtterance(clean);const vs=speechSynthesis.getVoices();const v=vs.find(x=>x.lang.startsWith('de'))||vs[0];if(v)u.voice=v;u.rate=dp?1.1:.95;u.pitch=dp?1.1:.85;u.onstart=()=>wf(true);u.onend=()=>{wf(false);su=null;};su=u;speechSynthesis.speak(u);}
function ttsBtn(id,btn){const el=document.getElementById(id);if(!el)return;const t=el.querySelector('.mt').textContent;if(btn.classList.contains('on')){stopS();btn.classList.remove('on');return;}document.querySelectorAll('.tts.on').forEach(b=>b.classList.remove('on'));btn.classList.add('on');speak(t);if(su)su.onend=()=>{btn.classList.remove('on');wf(false);su=null;};}
function stopS(){if('speechSynthesis'in window)speechSynthesis.cancel();wf(false);document.querySelectorAll('.tts.on').forEach(b=>b.classList.remove('on'));su=null;}
function wf(on){const w=document.querySelector('.wf');if(w)w.classList.toggle('on',on);}
function think(on){document.getElementById('tb').classList.toggle('on',on);document.getElementById('ty').classList.toggle('on',on);}
function mod(m,btn){curMod=m;document.querySelectorAll('.mb').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');notify('MODUL',m.toUpperCase()+' aktiviert');}
function clr(){document.getElementById('ch').innerHTML='';hist=[];stopS();pendingImg=null;pendingFile=null;const row=document.getElementById('attachRow');row.innerHTML='';row.style.display='none';}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function notify(t,m,err=false){const n=document.getElementById('no');document.getElementById('nt').textContent=t;document.getElementById('nm').textContent=m;n.className='notif'+(err?' e':'');n.style.display='block';setTimeout(()=>n.style.display='none',3500);}
if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script></body></html>
