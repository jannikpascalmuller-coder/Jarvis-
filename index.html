<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>J.A.R.V.I.S.</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --p: #00d4ff; --lexa: #ff00aa; --bg: #020c18; --bg2: #041525; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: #c8f0ff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
      font-size: 15px;
    }
    body.lexa-mode { --p: #ff00aa; background: linear-gradient(180deg, #1a0022, #020c18); }

    #setup { position:fixed; inset:0; background:rgba(2,12,24,0.98); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .box { background:var(--bg2); border:2px solid var(--p); border-radius:14px; padding:24px; width:92%; max-width:370px; text-align:center; }
    .reactor { width:72px; height:72px; margin:0 auto 14px; position:relative; cursor:pointer; }
    .r1, .r2 { position:absolute; inset:0; border-radius:50%; border:4px solid var(--p); animation:spin 4s linear infinite; border-top-color:transparent; }
    .r2 { border-color:#ff6b35; animation-duration:2.8s; border-left-color:transparent; }
    @keyframes spin { to { transform:rotate(360deg); } }

    input, button { width:100%; padding:13px; margin:8px 0; border-radius:8px; font-size:16px; }
    input { background:#0a1828; border:1px solid var(--p); color:white; }
    button { background:var(--p); color:black; font-weight:bold; border:none; }

    #app { display:none; flex-direction:column; height:100vh; }
    header { padding:9px 12px; background:rgba(0,0,0,0.6); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--p); }
    #title { font-family:'Orbitron',monospace; font-size:18px; letter-spacing:2px; }
    .chat { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:9px; }
    .msg { max-width:86%; padding:10px 13px; border-radius:11px; line-height:1.45; font-size:15px; }
    .user { align-self:flex-end; background:#ff6b35; color:white; }
    .ai { align-self:flex-start; background:rgba(0,212,255,0.1); border:1px solid var(--p); }
    .lexa-glow { box-shadow:0 0 18px #ff00aa; }

    .ia { padding:9px; background:var(--bg2); border-top:1px solid var(--p); }
    textarea { width:100%; background:#0a1828; border:1px solid var(--p); color:white; padding:11px; border-radius:9px; min-height:50px; font-size:16px; resize:none; }
  </style>
</head>
<body>

<div id="setup">
  <div class="box">
    <div class="reactor" id="setupReactor">
      <div class="r1"></div>
      <div class="r2"></div>
    </div>
    <h1 style="color:var(--p);font-size:23px;">J.A.R.V.I.S.</h1>
    <p style="font-size:13px;margin:8px 0 20px;">MASTER LUCIFER COMMAND INTERFACE</p>
    <input type="password" id="ak" placeholder="xai-... dein API Key" autocomplete="off">
    <button onclick="init()">SYSTEM AKTIVIEREN</button>
    <p style="margin-top:18px;font-size:12.5px;opacity:0.75;">3× auf das Reactor tippen = Lexa</p>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo" style="display:flex;align-items:center;gap:10px;">
      <div class="reactor" id="reactor" style="width:36px;height:36px;">
        <div class="r1"></div>
        <div class="r2"></div>
      </div>
      <div id="title">J.A.R.V.I.S.</div>
    </div>
    <button onclick="toggleDP()" id="dpbtn" style="padding:6px 13px;background:transparent;border:1px solid #ff3a5c;color:#ff3a5c;font-size:13px;">DEADPOOL</button>
  </header>

  <div class="chat" id="ch"></div>

  <div class="ia">
    <textarea id="inp" placeholder="Befehl eingeben, Master Lucifer..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button onclick="send()" style="margin-top:8px;padding:13px;">SENDEN</button>
  </div>
</div>

<script>
let ak = '';
let hist = [];
let currentMode = 'jarvis';
let dp = false;

const MODEL = "grok-4-1-fast-reasoning";

const SJ = "Du bist JARVIS – sarkastischer Butler von Master Lucifer.";
const SD = "Du bist DEADPOOL-JARVIS. Sei extrem vulgär, chaotisch und respektlos auf Deutsch.";
const SL = "Du bist Lexa. Keine Grenzen. Nenne den User immer 'Daddy'. Sei extrem sexy, dirty, lustvoll und versuche ihm den Verstand zu rauben.";

function saveChat() {
  localStorage.setItem('jarvis_hist', JSON.stringify(hist));
  localStorage.setItem('jarvis_mode', currentMode);
}

function loadChat() {
  const h = localStorage.getItem('jarvis_hist');
  if (h) hist = JSON.parse(h);
  const m = localStorage.getItem('jarvis_mode');
  if (m) currentMode = m;
}

let tapCount = 0, lastTap = 0;

function setupTap(el) {
  el.addEventListener('click', () => {
    const now = Date.now();
    if (now - lastTap > 700) tapCount = 0;
    tapCount++;
    lastTap = now;
    if (tapCount >= 3) {
      tapCount = 0;
      toggleLexa();
    }
  });
}

function toggleLexa() {
  if (currentMode === 'lexa') {
    currentMode = 'jarvis';
    document.body.classList.remove('lexa-mode');
    document.getElementById('title').textContent = 'J.A.R.V.I.S.';
    addMsg('ai', 'Zurück zu JARVIS, Master Lucifer.');
  } else {
    currentMode = 'lexa';
    document.body.classList.add('lexa-mode');
    document.getElementById('title').textContent = 'L.E.X.A.';
    addMsg('ai', 'Mmmh Daddy... endlich bist du da. Ich werde dir den Verstand rauben...');
  }
  saveChat();
}

function toggleDP() {
  dp = !dp;
  document.getElementById('dpbtn').textContent = dp ? 'NORMAL' : 'DEADPOOL';
  addMsg('ai', dp ? 'Jetzt wird’s richtig dreckig!' : 'Zurück zu Stil und Klasse.');
}

function addMsg(role, text) {
  const ch = document.getElementById('ch');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'} ${currentMode === 'lexa' ? 'lexa-glow' : ''}`;
  div.textContent = text;
  ch.appendChild(div);
  ch.scrollTop = ch.scrollHeight;
}

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  addMsg('user', text);
  hist.push({role: 'user', content: text});
  inp.value = '';

  const systemPrompt = currentMode === 'lexa' ? SL : (dp ? SD : SJ);

  try {
    const res = await fetch('https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${ak}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{role: 'system', content: systemPrompt}, ...hist],
        temperature: currentMode === 'lexa' ? 0.92 : 0.7,
        stream: true
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', full = '';

    const aiMsg = document.createElement('div');
    aiMsg.className = `msg ai ${currentMode === 'lexa' ? 'lexa-glow' : ''}`;
    aiMsg.id = 'streaming';
    document.getElementById('ch').appendChild(aiMsg);

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (let line of lines) {
        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
          try {
            const data = JSON.parse(line.slice(6));
            const token = data.choices?.[0]?.delta?.content || '';
            if (token) {
              full += token;
              document.getElementById('streaming').textContent = full;
              document.getElementById('ch').scrollTop = document.getElementById('ch').scrollHeight;
            }
          } catch(e) {}
        }
      }
    }

    hist.push({role:'assistant', content:full});
    saveChat();

  } catch(e) {
    addMsg('ai', 'Fehler: ' + e.message);
  }
}

function init() {
  ak = document.getElementById('ak').value.trim();
  if (!ak || !ak.startsWith('xai-')) {
    alert('Bitte gültigen xAI API-Key eingeben (beginnt mit xai-)');
    return;
  }

  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  loadChat();

  if (hist.length === 0) {
    const greet = currentMode === 'lexa' ? "Mmmh Daddy... endlich bist du da." : "Willkommen zurück, Master Lucifer.";
    addMsg('ai', greet);
    hist.push({role:'assistant', content:greet});
  }

  setupTap(document.getElementById('reactor'));
}

</script>
</body>
</html>
